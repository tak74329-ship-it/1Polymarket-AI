services:
  postgres:
    image: postgres:17
    container_name: polymarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: polymarket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"